      {children}
      {hint && <p className="text-xs text-slate-400 mt-1">{hint}</p>}
    </div>
  );
}

function Modal({open,onClose,title,children,wide}) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center p-4 overflow-y-auto" style={{background:"rgba(15,23,42,0.6)"}}>
      <div className={`bg-white rounded-2xl shadow-2xl w-full my-6 ${wide?"max-w-2xl":"max-w-md"}`}>
        <div className="flex justify-between items-center px-6 pt-5 pb-4 border-b border-slate-100">
          <h2 className="disp font-bold text-slate-800">{title}</h2>
          <button onClick={onClose} className="text-slate-300 hover:text-slate-700 text-xl font-bold leading-none">✕</button>
        </div>
        <div className="px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

function Confirm({open,msg,onOk,onCancel}) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{background:"rgba(15,23,42,0.6)"}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
        <div className="text-3xl text-center mb-3">⚠️</div>
        <p className="text-center text-slate-700 font-semibold mb-5">{msg}</p>
        <div className="flex gap-3">
          <button onClick={onCancel} className="flex-1 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-200">Cancel</button>
          <button onClick={onOk} className="flex-1 py-2.5 bg-red-600 text-white rounded-xl text-sm font-semibold hover:bg-red-700">Delete</button>
        </div>
      </div>
    </div>
  );
}

/* Signature motif: interlocking-circles used as eyebrow / divider device */
function LinkMark({size=18, color="#17458F"}) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 20" fill="none">
      <circle cx="11" cy="10" r="8.5" stroke={color} strokeWidth="2"/>
      <circle cx="21" cy="10" r="8.5" stroke="#F7A81B" strokeWidth="2"/>
    </svg>
  );
}

const BLANK_MEMBER = () => ({
  name:"", businessName:"", category:CATEGORIES[0], subCategory:"", city:"",
  club:"", tags:"", offer:"", need:"", phone:"", verified:false, featured:false
});
const BLANK_REQUEST = () => ({
  memberId:"", type:REQUEST_TYPES[0], urgency:URGENCY[2], title:"", details:""
});

/* ══════════════════════════════════
   MAIN APP
══════════════════════════════════ */
function App() {
  const [members, setMembers]   = useState([]);
  const [requests,setRequests]  = useState([]);
  const [loaded,  setLoaded]    = useState(false);
  const [syncSt,  setSyncSt]    = useState("connecting");

  const [tab,       setTab]     = useState("home"); // 'home' | 'directory' | 'requests'

  /* directory filters */
  const [q,        setQ]        = useState("");
  const [catFilter,setCatFilter]= useState("all");
  const [cityFilter,setCityFilter]=useState("all");
  const [featOnly, setFeatOnly] = useState(false);

  /* request filters */
  const [reqTypeFilter, setReqTypeFilter] = useState("all");
  const [reqStatusFilter, setReqStatusFilter] = useState("open"); // open | all | fulfilled

  const [isAdmin,  setIsAdmin]  = useState(false);
  const [pinModal, setPinModal] = useState(false);
  const [pinInput, setPinInput] = useState("");

  const [modal,    setModal]    = useState(null); // 'member' | 'request'
  const [form,     setForm]     = useState(BLANK_MEMBER());
  const [editId,   setEditId]   = useState(null);
  const [rForm,    setRForm]    = useState(BLANK_REQUEST());
  const [confirm,  setConfirm]  = useState(null);
  const [toast,    setToast]    = useState(null);

  useEffect(() => {
    let gotMembers=false, gotRequests=false;
    const check = () => { if (gotMembers && gotRequests) { setLoaded(true); setSyncSt("synced"); } };

    const mRef = DB.ref(MEMBERS_PATH);
    mRef.on("value", snap => {
      try {
        const raw = snap.val();
        if (raw === null) { mRef.set(SEED_MEMBERS).catch(console.error); }
        else { setMembers(toArr(raw)); gotMembers=true; check(); }
      } catch(e){ console.error(e); setSyncSt("error"); setLoaded(true); }
    }, e => { console.error(e); setSyncSt("error"); setLoaded(true); });

    const rRef = DB.ref(REQUESTS_PATH);
    rRef.on("value", snap => {
      try {
        const raw = snap.val();
        if (raw === null) { rRef.set(SEED_REQUESTS).catch(console.error); gotRequests=true; check(); }
        else { setRequests(toArr(raw)); gotRequests=true; check(); }
      } catch(e){ console.error(e); setSyncSt("error"); setLoaded(true); }
    }, e => { console.error(e); setSyncSt("error"); setLoaded(true); });

    return () => { mRef.off(); rRef.off(); };
  }, []);

  const saveMembers = (list) => {
    setSyncSt("saving");
    DB.ref(MEMBERS_PATH).set(list).then(()=>setSyncSt("synced")).catch(e=>{console.error(e);setSyncSt("error");});
  };
  const saveRequests = (list) => {
    setSyncSt("saving");
    DB.ref(REQUESTS_PATH).set(list).then(()=>setSyncSt("synced")).catch(e=>{console.error(e);setSyncSt("error");});
  };
  const notify = (msg,c="green") => { setToast({msg,c}); setTimeout(()=>setToast(null),2400); };

  /* ── admin gate ── */
  const tryPin = () => {
    if (pinInput === ADMIN_PIN) { setIsAdmin(true); setPinModal(false); setPinInput(""); notify("Admin mode on"); }
    else { notify("Incorrect PIN","red"); setPinInput(""); }
  };
  const exitAdmin = () => setIsAdmin(false);

  /* ── derived ── */
  const cities = useMemo(()=>[...new Set(members.map(m=>m.city).filter(Boolean))].sort(),[members]);

  const filteredMembers = useMemo(() => {
    const term = q.trim().toLowerCase();
    return members.filter(m => {
      if (catFilter!=="all" && m.category!==catFilter) return false;
      if (cityFilter!=="all" && m.city!==cityFilter) return false;
      if (featOnly && !m.featured) return false;
      if (!term) return true;
      const hay = [m.name,m.businessName,m.category,m.subCategory,m.city,m.offer,m.need,...(m.tags||[])].join(" ").toLowerCase();
      return hay.includes(term);
    }).sort((a,b)=> (b.featured?1:0)-(a.featured?1:0));
  }, [members, q, catFilter, cityFilter, featOnly]);

  const filteredRequests = useMemo(() => {
    return requests.filter(r => {
      if (reqTypeFilter!=="all" && r.type!==reqTypeFilter) return false;
      if (reqStatusFilter==="open" && r.status==="fulfilled") return false;
      if (reqStatusFilter==="fulfilled" && r.status!=="fulfilled") return false;
      return true;
    }).sort((a,b)=> new Date(b.postedAt) - new Date(a.postedAt));
  }, [requests, reqTypeFilter, reqStatusFilter]);

  const openReqCount = requests.filter(r=>r.status!=="fulfilled").length;

  /* ── member CRUD ── */
  const openAdd  = () => { setForm(BLANK_MEMBER()); setEditId(null); setModal("member"); };
  const openEdit = (m) => { setForm({...m, tags:(m.tags||[]).join(", ")}); setEditId(m.id); setModal("member"); };
  const closeModal = () => setModal(null);

  const saveMember = () => {
    if (!form.name.trim() || !form.businessName.trim() || !form.phone.trim()) return;
    const entry = {
      ...form, id: editId || uid(),
      tags: form.tags.split(",").map(t=>t.trim()).filter(Boolean),
    };
    if (editId) { saveMembers(members.map(m=>m.id===editId?entry:m)); notify("Member updated"); }
    else        { saveMembers([...members, entry]); notify("Member added"); }
    closeModal();
  };

  const delMember = (id, name) => setConfirm({
    msg: `Remove "${name}" from the network?`,
    onOk: () => { saveMembers(members.filter(m=>m.id!==id)); setConfirm(null); notify("Removed","red"); }
  });

  const toggleFlag = (id, key) => saveMembers(members.map(m=>m.id===id?{...m,[key]:!m[key]}:m));

  /* ── request CRUD (open posting — no PIN) ── */
  const openPostRequest = () => { setRForm(BLANK_REQUEST()); setModal("request"); };
  const closeRequestModal = () => setModal(null);

  const submitRequest = () => {
    if (!rForm.memberId || !rForm.title.trim()) return;
    const m = members.find(x=>x.id===rForm.memberId);
    if (!m) return;
    const entry = {
      id: uid(), memberId: m.id, memberName: m.name, businessName: m.businessName, phone: m.phone,
      type: rForm.type, urgency: rForm.urgency, title: rForm.title.trim(), details: rForm.details.trim(),
      status: "open", postedAt: dateStr()
    };
    saveRequests([entry, ...requests]);
    notify("Request posted!"); closeRequestModal();
  };

  const toggleFulfilled = (id) => saveRequests(requests.map(r=>r.id===id?{...r,status:r.status==="fulfilled"?"open":"fulfilled"}:r));
  const delRequest = (id, title) => setConfirm({
    msg: `Delete request "${title}"?`,
    onOk: () => { saveRequests(requests.filter(r=>r.id!==id)); setConfirm(null); notify("Request deleted","red"); }
  });

  /* ══════════════════════════════════
     LOADING
  ══════════════════════════════════ */
  if (!loaded) return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-4">
      <LinkMark size={40}/>
      <p className="disp font-bold text-slate-600 text-lg">Connecting to RBN…</p>
      {syncSt==="error" && <p className="text-red-500 text-sm">Firebase connection failed — check config.</p>}
    </div>
  );

  return (
    <div className="min-h-screen pb-16">

      {toast && (
        <div className={`fixed top-4 right-4 z-[100] px-4 py-2.5 rounded-xl text-white text-sm font-bold shadow-xl
          ${toast.c==="green"?"bg-emerald-500":toast.c==="red"?"bg-red-500":"bg-[#17458F]"}`}>{toast.msg}</div>
      )}
      <Confirm open={!!confirm} msg={confirm?.msg} onOk={confirm?.onOk} onCancel={()=>setConfirm(null)}/>

      {/* ── HEADER ── */}
      <header className="bg-[#17458F] text-white">
        <div className="max-w-6xl mx-auto px-4 pt-6 pb-5">
          <div className="flex items-center justify-between flex-wrap gap-4">
            <div className="flex items-center gap-3">
              <LinkMark size={30} color="#FFFFFF"/>
              <div>
                <h1 className="disp text-2xl font-bold tracking-tight leading-none">RBN</h1>
                <p className="text-xs text-white/60 mt-0.5 tracking-wide">Rotary Business Network · District 3250 (concept)</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <span className={`text-[11px] px-2.5 py-1 rounded-full font-semibold hidden sm:inline
                ${syncSt==="synced"?"bg-emerald-400/20 text-emerald-200":syncSt==="saving"?"bg-amber-400/20 text-amber-200":"bg-red-400/20 text-red-200"}`}>
                {syncSt==="synced"?"● Live":syncSt==="saving"?"⟳ Saving":"✕ Error"}
              </span>
              {isAdmin ? (
                <button onClick={exitAdmin} className="bg-white/10 hover:bg-white/20 px-3.5 py-1.5 rounded-lg text-xs font-bold">Exit Admin</button>
              ) : (
                <button onClick={()=>setPinModal(true)} className="bg-white/10 hover:bg-white/20 px-3.5 py-1.5 rounded-lg text-xs font-bold">🔒 Admin</button>
              )}
            </div>
          </div>

          {/* ── TOP-LEVEL TABS ── */}
          <div className="mt-5 flex gap-1 bg-white/10 p-1 rounded-xl w-fit">
            <button onClick={()=>setTab("home")} className={`px-4 py-2 rounded-lg text-sm font-bold transition-colors ${tab==="home"?"bg-white text-[#17458F]":"text-white/70 hover:text-white"}`}>🏠 Home</button>
            <button onClick={()=>setTab("directory")} className={`px-4 py-2 rounded-lg text-sm font-bold transition-colors ${tab==="directory"?"bg-white text-[#17458F]":"text-white/70 hover:text-white"}`}>📇 Directory</button>
            <button onClick={()=>setTab("requests")} className={`px-4 py-2 rounded-lg text-sm font-bold transition-colors relative ${tab==="requests"?"bg-white text-[#17458F]":"text-white/70 hover:text-white"}`}>
              🙋 Requests
              {openReqCount>0 && <span className={`ml-1.5 text-[10px] px-1.5 py-0.5 rounded-full font-bold ${tab==="requests"?"bg-[#F7A81B] text-white":"bg-[#F7A81B] text-[#17458F]"}`}>{openReqCount}</span>}
            </button>
          </div>

          {/* ── DIRECTORY SEARCH/FILTER BAR ── */}
          {tab==="directory" && (
            <div className="mt-4 flex flex-col md:flex-row gap-3">
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by name, business, service, tag…"
                className="flex-1 px-4 py-3 rounded-xl text-sm text-slate-800 ring-focus focus:outline-none"/>
              <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} className="px-3 py-3 rounded-xl text-sm text-slate-700 md:w-56">
                <option value="all">All categories</option>
                {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <select value={cityFilter} onChange={e=>setCityFilter(e.target.value)} className="px-3 py-3 rounded-xl text-sm text-slate-700 md:w-40">
                <option value="all">All cities</option>
                {cities.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <label className="flex items-center gap-2 bg-white/10 px-3.5 rounded-xl text-xs font-semibold whitespace-nowrap cursor-pointer">
                <input type="checkbox" checked={featOnly} onChange={e=>setFeatOnly(e.target.checked)} className="w-4 h-4"/>
                ⭐ Featured only
              </label>
              {isAdmin && <button onClick={openAdd} className="bg-[#F7A81B] hover:bg-[#e29a12] text-[#17458F] px-4 py-3 rounded-xl text-sm font-bold whitespace-nowrap">+ Add Member</button>}
            </div>
          )}

          {/* ── REQUESTS FILTER BAR ── */}
          {tab==="requests" && (
            <div className="mt-4 flex flex-col md:flex-row gap-3">
              <select value={reqTypeFilter} onChange={e=>setReqTypeFilter(e.target.value)} className="px-3 py-3 rounded-xl text-sm text-slate-700 md:w-56">
                <option value="all">All request types</option>
                {REQUEST_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <div className="flex gap-1 bg-white/10 p-1 rounded-xl w-fit">
                {[["open","Open"],["fulfilled","Fulfilled"],["all","All"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setReqStatusFilter(v)} className={`px-3.5 py-1.5 rounded-lg text-xs font-bold ${reqStatusFilter===v?"bg-white text-[#17458F]":"text-white/70 hover:text-white"}`}>{l}</button>
                ))}
              </div>
              <button onClick={openPostRequest} className="ml-auto bg-[#F7A81B] hover:bg-[#e29a12] text-[#17458F] px-4 py-3 rounded-xl text-sm font-bold whitespace-nowrap">+ Post a Request</button>
            </div>
          )}
        </div>
      </header>

      {/* ── PIN MODAL ── */}
      <Modal open={pinModal} onClose={()=>{setPinModal(false);setPinInput("");}} title="🔒 Admin Access">
        <Fld label="Enter admin PIN">
          <input type="password" value={pinInput} onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryPin()}
            className={INP} autoFocus/>
        </Fld>
        <button onClick={tryPin} className="w-full mt-4 py-2.5 bg-[#17458F] text-white rounded-xl text-sm font-bold hover:bg-[#123a78]">Unlock</button>
      </Modal>

      {/* ── ADD / EDIT MEMBER ── */}
      <Modal open={modal==="member"} onClose={closeModal} title={editId?"✏️ Edit Member":"➕ Add Member"} wide>
        <div className="grid grid-cols-2 gap-4">
          <Fld label="Full Name *"><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Rtn. Full Name" className={INP} autoFocus/></Fld>
          <Fld label="Business Name *"><input value={form.businessName} onChange={e=>setForm({...form,businessName:e.target.value})} className={INP}/></Fld>
          <Fld label="Category">
            <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} className={INP}>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </Fld>
          <Fld label="Sub-category"><input value={form.subCategory} onChange={e=>setForm({...form,subCategory:e.target.value})} placeholder="e.g. Steel & Hardware" className={INP}/></Fld>
          <Fld label="City"><input value={form.city} onChange={e=>setForm({...form,city:e.target.value})} className={INP}/></Fld>
          <Fld label="Club"><input value={form.club} onChange={e=>setForm({...form,club:e.target.value})} placeholder="e.g. RC Patna Central" className={INP}/></Fld>
          <div className="col-span-2"><Fld label="Tags (comma separated)" hint="Used for search matching"><input value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})} placeholder="gst, tax planning, audit" className={INP}/></Fld></div>
          <div className="col-span-2"><Fld label="What I offer"><textarea value={form.offer} onChange={e=>setForm({...form,offer:e.target.value})} rows={2} className={INP}/></Fld></div>
          <div className="col-span-2"><Fld label="What I'm looking for"><textarea value={form.need} onChange={e=>setForm({...form,need:e.target.value})} rows={2} className={INP}/></Fld></div>
          <Fld label="Phone (WhatsApp/Call) *"><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="98350 00000" className={INP}/></Fld>
          <div className="flex items-end gap-5 pb-1">
            <label className="flex items-center gap-2 text-sm font-semibold text-slate-600 cursor-pointer">
              <input type="checkbox" checked={form.verified} onChange={e=>setForm({...form,verified:e.target.checked})} className="w-4 h-4"/> Verified
            </label>
            <label className="flex items-center gap-2 text-sm font-semibold text-slate-600 cursor-pointer">
              <input type="checkbox" checked={form.featured} onChange={e=>setForm({...form,featured:e.target.checked})} className="w-4 h-4"/> Featured
            </label>
          </div>
        </div>
        <div className="flex gap-3 pt-5 mt-2 border-t border-slate-100">
          <button onClick={closeModal} className="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-sm font-bold hover:bg-slate-200">Cancel</button>
          <button onClick={saveMember} disabled={!form.name.trim()||!form.businessName.trim()||!form.phone.trim()}
            className="flex-1 py-2.5 bg-[#17458F] text-white rounded-xl text-sm font-bold hover:bg-[#123a78] disabled:opacity-40">
            {editId?"Update Member":"Add Member"}
          </button>
        </div>
      </Modal>

      {/* ── POST REQUEST (open to all, no PIN) ── */}
      <Modal open={modal==="request"} onClose={closeRequestModal} title="🙋 Post a Request">
        <div className="space-y-4">
          <Fld label="Who is this from? *">
            <select value={rForm.memberId} onChange={e=>setRForm({...rForm,memberId:e.target.value})} className={INP}>
              <option value="">— Select your profile —</option>
              {members.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(m=><option key={m.id} value={m.id}>{m.name} — {m.businessName}</option>)}
            </select>
            <p className="text-xs text-slate-400 mt-1">Not listed yet? Ask Admin to add your profile first.</p>
          </Fld>
          <div className="grid grid-cols-2 gap-3">
            <Fld label="Request type">
              <select value={rForm.type} onChange={e=>setRForm({...rForm,type:e.target.value})} className={INP}>
                {REQUEST_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </Fld>
            <Fld label="Urgency">
              <select value={rForm.urgency} onChange={e=>setRForm({...rForm,urgency:e.target.value})} className={INP}>
                {URGENCY.map(u=><option key={u}>{u}</option>)}
              </select>
            </Fld>
          </div>
          <Fld label="Title *"><input value={rForm.title} onChange={e=>setRForm({...rForm,title:e.target.value})} placeholder="e.g. Need a packaging vendor in Patna" className={INP}/></Fld>
          <Fld label="Details"><textarea value={rForm.details} onChange={e=>setRForm({...rForm,details:e.target.value})} rows={3} placeholder="Add specifics — quantity, timeline, budget…" className={INP}/></Fld>
          <div className="flex gap-3 pt-2 border-t border-slate-100">
            <button onClick={closeRequestModal} className="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-sm font-bold hover:bg-slate-200">Cancel</button>
            <button onClick={submitRequest} disabled={!rForm.memberId||!rForm.title.trim()}
              className="flex-1 py-2.5 bg-[#17458F] text-white rounded-xl text-sm font-bold hover:bg-[#123a78] disabled:opacity-40">Post Request</button>
          </div>
        </div>
      </Modal>

      {/* ══════════════════════════════════
          HOME TAB
      ══════════════════════════════════ */}
      {tab==="home" && (() => {
        const featuredMembers = members.filter(m=>m.featured).slice(0,3);
        const recentOpenRequests = requests.filter(r=>r.status!=="fulfilled").sort((a,b)=>new Date(b.postedAt)-new Date(a.postedAt)).slice(0,3);
        return (
        <div>
          {/* Hero */}
          <div className="bg-[#0F3269] text-white text-center px-4 py-14">
            <img src={WHEEL_LOGO} alt="Rotary Gold Wheel" className="mx-auto mb-5" style={{height:120,width:120,objectFit:"contain"}}/>
            <h1 className="disp text-4xl md:text-5xl font-bold tracking-tight">RBN</h1>
            <p className="text-lg md:text-xl font-semibold text-[#F7A81B] mt-1">Rotary Business Network</p>
            <p className="text-white/60 text-sm mt-3 max-w-md mx-auto">Connect. Refer. Grow.</p>
            <img src={DISTRICT_LOGO} alt="Rotary District 3250" className="mx-auto mt-6" style={{height:56,objectFit:"contain"}}/>

            <div className="flex flex-col sm:flex-row gap-3 justify-center mt-8">
              <button onClick={()=>setTab("directory")} className="bg-[#F7A81B] hover:bg-[#e29a12] text-[#17458F] px-6 py-3 rounded-xl text-sm font-bold">📇 Browse Directory</button>
              <button onClick={()=>setTab("requests")} className="bg-white/10 hover:bg-white/20 border border-white/20 px-6 py-3 rounded-xl text-sm font-bold">🙋 Post a Request</button>
            </div>
          </div>

          {/* Quick stats */}
          <div className="max-w-4xl mx-auto px-4 -mt-7">
            <div className="grid grid-cols-3 gap-3">
              <div className="bg-white rounded-2xl border border-slate-100 shadow-md py-4 text-center">
                <p className="disp text-2xl font-bold text-[#17458F]">{members.length}</p>
                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wide mt-0.5">Members</p>
              </div>
              <div className="bg-white rounded-2xl border border-slate-100 shadow-md py-4 text-center">
                <p className="disp text-2xl font-bold text-[#17458F]">{openReqCount}</p>
                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wide mt-0.5">Open Requests</p>
              </div>
              <div className="bg-white rounded-2xl border border-slate-100 shadow-md py-4 text-center">
                <p className="disp text-2xl font-bold text-[#17458F]">{new Set(members.map(m=>m.category)).size}</p>
                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wide mt-0.5">Categories</p>
              </div>
            </div>
          </div>

          <div className="max-w-4xl mx-auto px-4 mt-10 space-y-10">
            {/* Featured members */}
            <div>
              <div className="flex items-center justify-between mb-3">
                <h2 className="disp font-bold text-slate-800 flex items-center gap-2"><LinkMark size={16}/> Featured Members</h2>
                <button onClick={()=>setTab("directory")} className="text-xs font-bold text-[#17458F] hover:underline">View all →</button>
              </div>
              {featuredMembers.length===0 ? (
                <p className="text-sm text-slate-400 bg-white rounded-xl border border-dashed border-slate-200 p-4 text-center">No featured members yet — mark some ⭐ in Admin mode.</p>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  {featuredMembers.map(m=>(
                    <div key={m.id} className="bg-white rounded-2xl border border-[#F7A81B] ring-1 ring-[#F7A81B]/40 p-4">
                      <p className="text-[10px] font-bold uppercase tracking-widest text-[#17458F]">{m.category}</p>
                      <h3 className="disp font-bold text-slate-900 mt-1">{m.businessName}</h3>
                      <p className="text-xs text-slate-400">{m.name}</p>
                      <a href={waLink(m.phone, `Hi ${m.name}, connecting with you via Rotary Business Network 🤝`)} target="_blank" rel="noopener"
                        className="block text-center mt-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-xs font-bold">💬 WhatsApp</a>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Recent open requests */}
            <div>
              <div className="flex items-center justify-between mb-3">
                <h2 className="disp font-bold text-slate-800 flex items-center gap-2">🙋 Recent Requests</h2>
                <button onClick={()=>setTab("requests")} className="text-xs font-bold text-[#17458F] hover:underline">View all →</button>
              </div>
              {recentOpenRequests.length===0 ? (
                <p className="text-sm text-slate-400 bg-white rounded-xl border border-dashed border-slate-200 p-4 text-center">No open requests right now — be the first to post one.</p>
              ) : (
                <div className="space-y-2.5">
                  {recentOpenRequests.map(r=>(
                    <div key={r.id} className="bg-white rounded-xl border border-slate-100 p-4 flex items-center justify-between gap-3">
                      <div className="min-w-0">
                        <p className="text-[10px] font-bold uppercase tracking-widest text-[#17458F]">{r.type}</p>
                        <h3 className="font-bold text-slate-800 truncate">{r.title}</h3>
                        <p className="text-xs text-slate-400">{r.memberName} · {fmtDate(r.postedAt)}</p>
                      </div>
                      <a href={waLink(r.phone, `Hi ${r.memberName}, I saw your request on RBN — "${r.title}". I might be able to help.`)}
                        target="_blank" rel="noopener" className="shrink-0 px-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-xs font-bold whitespace-nowrap">🙋 Help</a>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
        );
      })()}

      {/* ══════════════════════════════════
          DIRECTORY TAB
      ══════════════════════════════════ */}
      {tab==="directory" && (
        <div className="max-w-6xl mx-auto px-4 mt-6">
          <div className="flex items-center justify-between mb-4">
            <p className="text-sm text-slate-500 font-medium">{filteredMembers.length} of {members.length} members</p>
            {isAdmin && <p className="text-xs text-[#17458F] font-bold bg-[#17458F]/10 px-3 py-1 rounded-full">Admin mode — edit controls visible</p>}
          </div>

          {filteredMembers.length===0 && (
            <div className="text-center py-24">
              <LinkMark size={32}/>
              <p className="text-slate-400 font-semibold mt-3">No members match this search yet.</p>
              <p className="text-slate-300 text-sm mt-1">Try a different keyword or clear filters.</p>
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {filteredMembers.map(m => (
              <div key={m.id} className={`bg-white rounded-2xl border shadow-sm hover:shadow-md transition-shadow p-5 flex flex-col
                ${m.featured?"border-[#F7A81B] ring-1 ring-[#F7A81B]/40":"border-slate-100"}`}>

                <div className="flex items-start justify-between gap-2 mb-2">
                  <div className="min-w-0">
                    <div className="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest text-[#17458F]">
                      <LinkMark size={12}/> {m.category}{m.subCategory?` · ${m.subCategory}`:""}
                    </div>
                    <h3 className="disp font-bold text-slate-900 mt-1 truncate">{m.businessName}</h3>
                    <p className="text-xs text-slate-400 truncate">{m.name} {m.club?`· ${m.club}`:""}</p>
                  </div>
                  {m.featured && <span className="text-[10px] font-bold bg-[#F7A81B]/15 text-[#a6740c] px-2 py-1 rounded-full whitespace-nowrap">⭐ Featured</span>}
                </div>

                <div className="flex items-center gap-2 mb-3">
                  {m.verified && <span className="text-[10px] font-bold bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full">✓ Verified</span>}
                  {m.city && <span className="text-[10px] font-bold bg-slate-50 text-slate-500 px-2 py-0.5 rounded-full">📍 {m.city}</span>}
                </div>

                {m.offer && <p className="text-sm text-slate-600 mb-2"><span className="font-bold text-slate-400 text-xs uppercase tracking-wide block mb-0.5">Offers</span>{m.offer}</p>}
                {m.need &&  <p className="text-sm text-slate-600 mb-3"><span className="font-bold text-slate-400 text-xs uppercase tracking-wide block mb-0.5">Looking for</span>{m.need}</p>}

                {(m.tags||[]).length>0 && (
                  <div className="flex flex-wrap gap-1.5 mb-4">
                    {m.tags.map(t=><span key={t} className="text-[10px] font-semibold bg-[#17458F]/5 text-[#17458F] px-2 py-0.5 rounded-full">{t}</span>)}
                  </div>
                )}

                <div className="mt-auto flex gap-2 pt-2">
                  <a href={telLink(m.phone)} className="flex-1 text-center py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-xs font-bold">📞 Call</a>
                  <a href={waLink(m.phone, `Hi ${m.name}, connecting with you via Rotary Business Network 🤝`)} target="_blank" rel="noopener" className="flex-1 text-center py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-xs font-bold">💬 WhatsApp</a>
                </div>

                {isAdmin && (
                  <div className="flex gap-2 pt-3 mt-3 border-t border-slate-50">
                    <button onClick={()=>toggleFlag(m.id,"verified")} className="text-[11px] font-bold text-slate-400 hover:text-emerald-600">{m.verified?"Unverify":"Verify"}</button>
                    <button onClick={()=>toggleFlag(m.id,"featured")} className="text-[11px] font-bold text-slate-400 hover:text-amber-600">{m.featured?"Unfeature":"Feature"}</button>
                    <button onClick={()=>openEdit(m)} className="text-[11px] font-bold text-slate-400 hover:text-[#17458F] ml-auto">Edit</button>
                    <button onClick={()=>delMember(m.id,m.name)} className="text-[11px] font-bold text-slate-400 hover:text-red-500">Delete</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ══════════════════════════════════
          REQUESTS TAB
      ══════════════════════════════════ */}
      {tab==="requests" && (
        <div className="max-w-4xl mx-auto px-4 mt-6">
          <div className="flex items-center justify-between mb-4">
            <p className="text-sm text-slate-500 font-medium">{filteredRequests.length} request{filteredRequests.length!==1?"s":""}</p>
            {isAdmin && <p className="text-xs text-[#17458F] font-bold bg-[#17458F]/10 px-3 py-1 rounded-full">Admin mode — delete controls visible</p>}
          </div>

          {filteredRequests.length===0 && (
            <div className="text-center py-24">
              <LinkMark size={32}/>
              <p className="text-slate-400 font-semibold mt-3">No requests here yet.</p>
              <p className="text-slate-300 text-sm mt-1">Be the first to post what you need.</p>
            </div>
          )}

          <div className="space-y-3">
            {filteredRequests.map(r => (
              <div key={r.id} className={`bg-white rounded-2xl border shadow-sm p-5 ${r.status==="fulfilled"?"border-slate-100 opacity-60":"border-slate-100"}`}>
                <div className="flex items-start justify-between gap-3 mb-2 flex-wrap">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-[10px] font-bold uppercase tracking-widest text-[#17458F] bg-[#17458F]/5 px-2 py-1 rounded-full">{r.type}</span>
                    <span className={`text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-full
                      ${r.urgency==="Immediate"?"bg-red-50 text-red-600":r.urgency==="This month"?"bg-amber-50 text-amber-600":"bg-slate-50 text-slate-500"}`}>{r.urgency}</span>
                    {r.status==="fulfilled" && <span className="text-[10px] font-bold uppercase tracking-widest bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full">✓ Fulfilled</span>}
                  </div>
                  <span className="text-xs text-slate-300 whitespace-nowrap">{fmtDate(r.postedAt)}</span>
                </div>

                <h3 className="disp font-bold text-slate-900 text-lg mb-1">{r.title}</h3>
                {r.details && <p className="text-sm text-slate-600 mb-3">{r.details}</p>}

                <p className="text-xs text-slate-400 mb-3">Posted by <span className="font-semibold text-slate-600">{r.memberName}</span> · {r.businessName}</p>

                <div className="flex gap-2 flex-wrap">
                  <a href={waLink(r.phone, `Hi ${r.memberName}, I saw your request on RBN — "${r.title}". I might be able to help.`)}
                    target="_blank" rel="noopener" className="flex-1 min-w-[140px] text-center py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-xs font-bold">🙋 I can help</a>
                  <a href={telLink(r.phone)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-xs font-bold">📞 Call</a>
                  <button onClick={()=>toggleFulfilled(r.id)} className="px-4 py-2 bg-slate-50 hover:bg-slate-100 text-slate-500 rounded-lg text-xs font-bold">
                    {r.status==="fulfilled"?"Reopen":"Mark Fulfilled"}
                  </button>
                  {isAdmin && <button onClick={()=>delRequest(r.id,r.title)} className="px-3 py-2 text-red-400 hover:text-red-600 text-xs font-bold">Delete</button>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <footer className="max-w-6xl mx-auto px-4 mt-16 pt-6 border-t border-slate-200 text-center">
        <p className="text-xs text-slate-400">RBN — Rotary Business Network · Concept v0.2 · Seed data is a placeholder, replace via Admin</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
